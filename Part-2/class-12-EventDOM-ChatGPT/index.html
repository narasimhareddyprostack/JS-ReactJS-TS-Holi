<!DOCTYPE html>
<html>
<head>
    <title>Events & DOM Examples</title>
</head>
<body>

    <h1>Events & DOM Examples</h1>

    <p>Focus Time - change input box background color yellow</p>
    <label for="box1">OnFocus Example:</label>
    <input type="text" id="box1" onfocus="changeColor(this)">

    <hr>

    <p>Convert input box text lower to upper</p>
    <label for="box2">OnBlur Example:</label>
    <input type="text" id="box2" onblur="toUpperText(this)">

    <script src="colors.js"></script>
</body>
</html>

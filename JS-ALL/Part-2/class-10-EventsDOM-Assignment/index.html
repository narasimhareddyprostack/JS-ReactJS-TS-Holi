<html>
    <head>
        <title>Events  and DOM</title>
        <script src="./colors.js" type="text/javascript"></script>
    </head>
    <body>
        <button onmouseover="changeColor1()" 
                id="btn1" 
                style="background-color: red;">Mouse Over</button>
        <br><br>
        <button class="btnStyles1" onmouseout="changeColor2()">Mouse Out</button>
        <br><br>
        <button class="btnStyles2" 
                onclick="changeColor3()" 
                style="background-color: red;">Click</button>
        <br><br>
        <button class="btnStyles3" 
                onclick="changeColor4()" 
                style="background-color: red;">Double Click</button>
    </body>
</html>
